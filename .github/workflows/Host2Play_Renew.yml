name: Host2Play 续期（极简无错版）

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: host2play-renew
  cancel-in-progress: false

jobs:
  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg unzip curl wget jq ca-certificates \
            fonts-liberation libasound2t64 libatk-bridge2.0-0t64 \
            libatk1.0-0t64 libc6 libcairo2 libcups2t64 libdbus-1-3 \
            libexpat1 libfontconfig1 libgbm1 libgcc-s1 libglib2.0-0t64 \
            libgtk-3-0t64 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 \
            libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 \
            libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 xdg-utils

      - name: 安装 Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -fy -qq
          google-chrome --version

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel -qq
          pip install -qq \
            DrissionPage==4.1.0.18 \
            DataRecorder==3.6.2 \
            DownloadKit requests lxml cssselect websocket-client psutil \
            xvfbwrapper SpeechRecognition pydub

      # ---------------- 1. 尝试外部代理（PROXY_NODE） ----------------
      - name: 尝试启动外部代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          echo "[INFO] 尝试使用 PROXY_NODE..."
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置 PROXY_NODE，跳过"
            exit 0
          fi

          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              sys.exit(1)

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "port": 10808,
                  "listen": "127.0.0.1",
                  "protocol": "socks",
                  "settings": {"udp": True}
              }],
              "outbounds": []
          }

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          else:
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              host_port, params_str = (rest.split("?", 1) + [""])[:2]
              address, port = (host_port.split(":") + ["443"])[:2]

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }

              if security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              padding = 4 - len(content) % 4
              if padding != 4:
                  content += "=" * padding

              decoded = base64.b64decode(content).decode()
              vm = json.loads(decoded)

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": vm.get("add"),
                          "port": int(vm.get("port", 443)),
                          "users": [{
                              "id": vm.get("id"),
                              "alterId": int(vm.get("aid", 0)),
                              "security": "auto"
                          }]
                      }]
                  },
                  "streamSettings": {
                      "network": vm.get("net", "tcp"),
                      "security": "tls" if vm.get("tls") else "none"
                  }
              }

              config["outbounds"].append(outbound)

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          PYEOF

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          for i in {1..5}; do
            if curl -x socks5://127.0.0.1:10808 -s https://api.ipify.org; then
              echo "PROXY_SOCKS5=127.0.0.1:10808" >> $GITHUB_ENV
              echo "[INFO] 代理启动成功"
              exit 0
            fi
            sleep 3
          done

          echo "[ERROR] 外部代理失败"
          exit 1

      # ---------------- 2. WARP fallback（修复版，无 warp-cli 依赖） ----------------
      - name: 启用 WARP（备用）
        uses: fscarmen/warp-on-actions@v1.3
        if: failure()
        with:
          stack: dual
          mode: client

      # ---------------- 3. DNS 修复 ----------------
      - name: 修复 DNS
        run: |
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          curl -s https://api.ipify.org

      - name: 创建目录
        run: mkdir -p output/screenshots

      # ---------------- 4. 执行脚本 ----------------
      - name: 执行续订
        env:
          PYTHONUNBUFFERED: 1
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      # ---------------- 5. 上传截图 ----------------
      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      # ---------------- 6. 时间记录 ----------------
      - name: 更新时间文件
        if: always()
        run: echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt

      # ---------------- 7. commit ----------------
      - name: Commit & Push
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git commit -m "⏱️ 更新时间" || true
          git pull --rebase origin main || true
          git push origin HEAD:main

      # ---------------- 8. 清理 ----------------
      - name: 清理历史运行
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
