name: Host2Play 续期

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      - name: 拉取私库 zhiyong
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.GH_PAT }}
          path: zhiyong

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: 安装并启动 sing-box 代理
        env:
          SING_BOX_CONFIG: ${{ secrets.SING_BOX_CONFIG }}
        run: |
          echo "[INFO] 下载最新版 sing-box..."
          LATEST=$(curl -sL --max-time 10 https://api.github.com/repos/SagerNet/sing-box/releases/latest | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p')
          ARCH="amd64"
          URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${LATEST}-linux-${ARCH}.tar.gz"
          wget -q --timeout=30 -O /tmp/sing-box.tar.gz "$URL"
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          sudo mv /tmp/sing-box-*/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

          echo "[INFO] 写入 sing-box 配置..."
          echo "$SING_BOX_CONFIG" | base64 -d > /tmp/sing-box-config.json

          echo "[INFO] 启动 sing-box..."
          nohup sing-box run -c /tmp/sing-box-config.json > /tmp/sing-box.log 2>&1 &
          sleep 5

          echo "[INFO] sing-box 进程状态:"
          ps aux | grep sing-box | grep -v grep || true

          echo "[INFO] 测试代理连通性..."
          curl -s --max-time 10 -x http://127.0.0.1:2080 https://api.ipify.org && echo || echo "[WARN] 代理测试失败，查看日志:"
          cat /tmp/sing-box.log || true

      - name: 执行续订
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HTTP_PROXY: http://127.0.0.1:2080
          HTTPS_PROXY: http://127.0.0.1:2080
          NO_PROXY: localhost,127.0.0.1
        run: python zhiyong/Host2Play.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
