name: Host2Play 续期

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      - name: 拉取私库 zhiyong
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.GH_PAT }}
          path: zhiyong

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl golang-go
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: 安装并启动 sing-box 代理
        env:
          VLESS_URL: ${{ secrets.SING_BOX_CONFIG }}
        run: |
          echo "[INFO] 通过 go install 安装 sing-box..."
          go install -v github.com/sagernet/sing-box/cmd/sing-box@latest
          export PATH=$PATH:$HOME/go/bin
          sing-box version || { echo "[ERROR] sing-box 安装失败"; exit 1; }

          echo "[INFO] 解析 vless 链接并生成 sing-box 配置..."
          python3 << 'PYEOF'
          import urllib.parse, json, os

          vless = os.getenv("VLESS_URL", "").strip()
          if not vless.startswith("vless://"):
              print("[ERROR] SING_BOX_CONFIG 不是有效的 vless:// 链接")
              exit(1)

          parsed = urllib.parse.urlparse(vless)
          uuid = parsed.username
          host = parsed.hostname
          port = parsed.port
          q = urllib.parse.parse_qs(parsed.query)

          # 构建 sing-box outbound
          outbound = {
              "type": "vless",
              "tag": "proxy",
              "server": host,
              "server_port": port,
              "uuid": uuid,
          }

          # transport (ws/tcp/grpc 等)
          t = q.get("type", ["tcp"])[0]
          if t and t != "tcp":
              transport = {"type": t}
              path = q.get("path", [""])[0]
              if path:
                  transport["path"] = urllib.parse.unquote(path)
              host_hdr = q.get("host", [""])[0]
              if host_hdr:
                  transport["headers"] = {"Host": host_hdr}
              outbound["transport"] = transport

          # tls
          security = q.get("security", [""])[0]
          if security == "tls" or security == "reality":
              tls = {"enabled": True}
              sni = q.get("sni", [""])[0] or host
              if sni:
                  tls["server_name"] = sni
              insecure = q.get("insecure", ["0"])[0]
              if insecure == "1":
                  tls["insecure"] = True
              fp = q.get("fp", [""])[0]
              if fp:
                  tls["utls"] = {"enabled": True, "fingerprint": fp}
              outbound["tls"] = tls

          config = {
              "log": {"level": "info", "timestamp": True},
              "dns": {
                  "servers": [
                      {"tag": "google", "address": "tls://8.8.8.8"},
                      {"tag": "local", "address": "local", "detour": "direct"}
                  ],
                  "final": "google"
              },
              "inbounds": [
                  {
                      "type": "mixed",
                      "tag": "mixed-in",
                      "listen": "127.0.0.1",
                      "listen_port": 2080
                  }
              ],
              "outbounds": [outbound, {"type": "direct", "tag": "direct"}],
              "route": {
                  "rules": [{"geoip": "private", "outbound": "direct"}],
                  "final": "proxy",
                  "auto_detect_interface": True
              }
          }

          with open("/tmp/sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("[INFO] sing-box 配置已生成")
          print(json.dumps(config, indent=2))
          PYEOF

          echo "[INFO] 验证配置..."
          sing-box check -c /tmp/sing-box-config.json || { echo "[ERROR] 配置验证失败"; exit 1; }

          echo "[INFO] 启动 sing-box..."
          nohup sing-box run -c /tmp/sing-box-config.json > /tmp/sing-box.log 2>&1 &
          sleep 5

          echo "[INFO] sing-box 进程状态:"
          ps aux | grep sing-box | grep -v grep || true

          echo "[INFO] 测试代理连通性..."
          curl -s --max-time 15 -x http://127.0.0.1:2080 https://api.ipify.org && echo || {
            echo "[WARN] 代理测试失败，查看日志:"
            cat /tmp/sing-box.log
            exit 1
          }

      - name: 执行续订
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HTTP_PROXY: http://127.0.0.1:2080
          HTTPS_PROXY: http://127.0.0.1:2080
          NO_PROXY: localhost,127.0.0.1
        run: python zhiyong/Host2Play.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
