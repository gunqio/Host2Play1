name: Host2Play 续期

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      - name: 拉取私库 zhiyong
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.GH_PAT }}
          path: zhiyong

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl golang-go
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: 安装并启动 sing-box 代理
        env:
          SUB_URL: ${{ secrets.SING_BOX_CONFIG }}
        run: |
          echo "[INFO] 通过 go install 安装 sing-box..."
          go install -v github.com/sagernet/sing-box/cmd/sing-box@latest
          export PATH=$PATH:$HOME/go/bin
          sing-box version || { echo "[ERROR] sing-box 安装失败"; exit 1; }

          echo "[INFO] 下载订阅并生成配置..."
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, base64

          sub_url = os.getenv("SUB_URL", "").strip()
          if not sub_url.startswith("http"):
              print("[ERROR] SING_BOX_CONFIG 不是有效的订阅链接")
              exit(1)

          req = urllib.request.Request(sub_url, headers={
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          })
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  sub_content = resp.read()
          except Exception as e:
              print(f"[ERROR] 订阅下载失败: {e}")
              exit(1)

          try:
              decoded = base64.b64decode(sub_content).decode('utf-8')
              nodes = [line.strip() for line in decoded.splitlines() if line.strip()]
          except Exception:
              try:
                  text = sub_content.decode('utf-8')
                  nodes = [line.strip() for line in text.splitlines() if line.strip()]
              except Exception as e:
                  print(f"[ERROR] 订阅解析失败: {e}")
                  exit(1)

          if not nodes:
              print("[ERROR] 订阅中没有节点")
              exit(1)

          print(f"[INFO] 订阅包含 {len(nodes)} 个节点")

          config = {
              "log": {"level": "warn", "timestamp": True},
              "inbounds": [
                  {
                      "type": "mixed",
                      "tag": "mixed-in",
                      "listen": "127.0.0.1",
                      "listen_port": 2080
                  }
              ],
              "outbounds": [
                  {
                      "type": "selector",
                      "tag": "proxy",
                      "outbounds": ["auto"],
                      "default": "auto"
                  },
                  {
                      "type": "urltest",
                      "tag": "auto",
                      "outbounds": [],
                      "url": "http://www.gstatic.com/generate_204",
                      "interval": "1m",
                      "tolerance": 50
                  },
                  {"type": "direct", "tag": "direct"}
              ],
              "route": {
                  "final": "proxy",
                  "auto_detect_interface": True
              }
          }

          node_tags = []
          for i, node in enumerate(nodes):
              tag = f"node-{i+1}"
              node_tags.append(tag)
              
              if node.startswith("vless://"):
                  parsed = urllib.parse.urlparse(node)
                  uuid = parsed.username
                  host = parsed.hostname
                  port = parsed.port or 443
                  q = urllib.parse.parse_qs(parsed.query)
                  
                  outbound = {
                      "type": "vless",
                      "tag": tag,
                      "server": host,
                      "server_port": port,
                      "uuid": uuid,
                  }
                  
                  t = q.get("type", ["tcp"])[0]
                  if t and t != "tcp":
                      transport = {"type": t}
                      path = q.get("path", [""])[0]
                      if path:
                          transport["path"] = urllib.parse.unquote(path)
                      host_hdr = q.get("host", [""])[0]
                      if host_hdr:
                          transport["headers"] = {"Host": host_hdr}
                      outbound["transport"] = transport
                  
                  security = q.get("security", [""])[0]
                  if security == "tls" or security == "reality":
                      tls = {"enabled": True}
                      sni = q.get("sni", [""])[0] or host
                      if sni:
                          tls["server_name"] = sni
                      insecure = q.get("insecure", ["0"])[0]
                      if insecure == "1":
                          tls["insecure"] = True
                      outbound["tls"] = tls
                  
                  config["outbounds"].append(outbound)
                  
              elif node.startswith("vmess://"):
                  try:
                      vmess_json = base64.b64decode(node.replace("vmess://", "")).decode('utf-8')
                      vmess_cfg = json.loads(vmess_json)
                      outbound = {
                          "type": "vmess",
                          "tag": tag,
                          "server": vmess_cfg.get("add", ""),
                          "server_port": int(vmess_cfg.get("port", 443)),
                          "uuid": vmess_cfg.get("id", ""),
                          "security": vmess_cfg.get("scy", "auto"),
                      }
                      if vmess_cfg.get("tls") == "tls":
                          outbound["tls"] = {
                              "enabled": True,
                              "server_name": vmess_cfg.get("sni", vmess_cfg.get("add", ""))
                          }
                      if vmess_cfg.get("net") and vmess_cfg.get("net") != "tcp":
                          outbound["transport"] = {
                              "type": vmess_cfg.get("net"),
                              "path": vmess_cfg.get("path", ""),
                          }
                          if vmess_cfg.get("host"):
                              outbound["transport"]["headers"] = {"Host": vmess_cfg.get("host")}
                      config["outbounds"].append(outbound)
                  except Exception as e:
                      print(f"[WARN] 节点 {i+1} 解析失败: {e}")
                      continue
              else:
                  print(f"[WARN] 不支持的节点格式: {node[:50]}...")
                  continue

          if not node_tags:
              print("[ERROR] 没有成功解析的节点")
              exit(1)

          config["outbounds"][1]["outbounds"] = node_tags
          config["outbounds"][0]["outbounds"] = ["auto"] + node_tags

          with open("/tmp/sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)
          print(f"[INFO] sing-box 配置已生成，包含 {len(node_tags)} 个节点")
          PYEOF

          echo "[INFO] 启动 sing-box..."
          nohup sing-box run -c /tmp/sing-box-config.json > /tmp/sing-box.log 2>&1 &
          sleep 5

          echo "[INFO] sing-box 进程状态:"
          ps aux | grep sing-box | grep -v grep || true

          echo "[INFO] 测试代理连通性..."
          curl -s --max-time 15 -x http://127.0.0.1:2080 https://api.ipify.org && echo || {
            echo "[WARN] 代理测试失败，查看脱敏日志:"
            grep -v -iE 'server|uuid|host|path|sni|password|address|token|vless|vmess|turn@' /tmp/sing-box.log | tail -20 || true
            exit 1
          }

      - name: 执行续订
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HTTP_PROXY: http://127.0.0.1:2080
          HTTPS_PROXY: http://127.0.0.1:2080
          NO_PROXY: localhost,127.0.0.1
        run: python zhiyong/Host2Play.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
